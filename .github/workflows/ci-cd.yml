name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        run: mvn test --no-transfer-progress
        working-directory: api

  check-secrets:
    name: Check AWS secrets
    runs-on: ubuntu-latest
    outputs:
      aws-configured: ${{ steps.check.outputs.aws-configured }}
    steps:
      - name: Detect AWS configuration
        id: check
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          if [ -n "$AWS_ROLE_ARN" ] && [ -n "$ECR_REGISTRY" ]; then
            echo "AWS secrets found — deploy jobs will run."
            echo "aws-configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "AWS secrets not set — skipping build/deploy jobs."
            echo "aws-configured=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, check-secrets]
    if: github.ref == 'refs/heads/main' && needs.check-secrets.outputs.aws-configured == 'true'
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build \
            -t $ECR_REGISTRY/cloud-native-api:${{ github.sha }} \
            -t $ECR_REGISTRY/cloud-native-api:latest \
            api/
          docker push $ECR_REGISTRY/cloud-native-api:${{ github.sha }}
          docker push $ECR_REGISTRY/cloud-native-api:latest

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [check-secrets, build-and-push]
    if: github.ref == 'refs/heads/main' && needs.check-secrets.outputs.aws-configured == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Apply base manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/postgres/
          kubectl apply -f k8s/redis/

      - name: Deploy API with zero-downtime rollout
        run: |
          kubectl set image deployment/api \
            api=$ECR_REGISTRY/cloud-native-api:${{ github.sha }} \
            -n cloud-native
          kubectl rollout status deployment/api -n cloud-native --timeout=5m

      - name: Apply HPA and ingress
        run: |
          kubectl apply -f k8s/api/hpa.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Apply monitoring stack
        run: kubectl apply -f k8s/monitoring/
